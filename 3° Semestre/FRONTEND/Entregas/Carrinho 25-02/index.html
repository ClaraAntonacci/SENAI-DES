<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Loja</h1>
    <button onclick="abrirCarrinho()">Carrinho</button>
</header>

<main>
    <div class="produtos" id="produtos"></div>
</main>

<div id="modalCarrinho" class="modal">
    <div class="modal-content">
        <h2>Seu Carrinho</h2>
        <table>
            <thead>
                <tr>
                    <th>Produto</th>
                    <th>Qtd</th>
                    <th>Preço</th>
                </tr>
            </thead>
            <tbody id="listaCarrinho"></tbody>
        </table>

        <h3 id="total"></h3>

        <div class="modal-buttons">
            <button onclick="finalizarPedido()">Fazer pedido</button>
            <button onclick="fecharCarrinho()">Cancelar</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
