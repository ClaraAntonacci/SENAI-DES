<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locadora de Filmes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">


    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Locadora de Filmes</span>
            <button class="btn btn-primary">+ Novo Filme</button>
        </div>
    </nav>


    <main class="container mt-4">

        <div class="mb-3">

            <label class="form-label">Filtrar por gênero:</label>

            <select class="form-select w-25">
                <option>Todos</option>
                <option>Ação</option>
                <option>Comédia</option>
                <option>Terror</option>
                <option>Drama</option>
                <option>Romance</option>
            </select>

        </div>


        <div class="table-responsive">

            <table class="table table-bordered table-striped text-center align-middle">

                <thead class="table-primary">

                    <tr>
                        <th>Imagem</th>
                        <th>Nome</th>
                        <th>Ano</th>
                        <th>Diretor</th>
                        <th>Gênero</th>
                        <th>Ações</th>
                    </tr>

                </thead>

                <tbody>

                    <tr>

                        <td>
                            <img src="https://m.media-amazon.com/images/I/81p+xe8cbnL._AC_SY679_.jpg" width="80"
                                class="rounded">
                        </td>

                        <td>Matrix</td>
                        <td>1999</td>
                        <td>Lana Wachowski</td>
                        <td>Ação</td>

                        <td>
                            <button class="btn btn-warning btn-sm">Editar</button>
                            <button class="btn btn-danger btn-sm">Excluir</button>
                        </td>

                    </tr>

                    <tr>

                        <td>
                            <img src="https://m.media-amazon.com/images/I/71niXI3lxlL._AC_SY679_.jpg" width="80"
                                class="rounded">
                        </td>

                        <td>It - A Coisa</td>
                        <td>2017</td>
                        <td>Andy Muschietti</td>
                        <td>Terror</td>

                        <td>
                            <button class="btn btn-warning btn-sm">Editar</button>
                            <button class="btn btn-danger btn-sm">Excluir</button>
                        </td>

                    </tr>

                    <tr>
                        <td>
                            <img src="https://br.web.img3.acsta.net/c_310_420/pictures/14/10/10/19/21/152595.jpg" width="80"
                                class="rounded">
                        </td>
                        <td>O Iluminado</td>
                        <td>1980</td>
                        <td>Stanley Kubrick</td>
                        <td>Terror</td>
                        <td>
                            <button class="btn btn-warning btn-sm">Editar</button>
                            <button class="btn btn-danger btn-sm">Excluir</button>
                        </td>
                    </tr>

                </tbody>

            </table>

        </div>

    </main>

</body>

</html>
